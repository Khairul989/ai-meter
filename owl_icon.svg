<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Near-black background with deep atmosphere -->
    <radialGradient id="bg" cx="50%" cy="45%" r="75%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F1416"/>
      <stop offset="70%" stop-color="#06090B"/>
      <stop offset="100%" stop-color="#020304"/>
    </radialGradient>
    
    <!-- Subtle mystical haze around owl - hint of violet-cyan -->
    <radialGradient id="mysticHaze" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2A4548" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#1A2025" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A0C0F" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Ashen bone body - cooler, less bright than before -->
    <linearGradient id="bodyFill" x1="512" y1="200" x2="512" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8CDC8"/>
      <stop offset="1" stop-color="#8A9090"/>
    </linearGradient>
    
    <!-- GLOWING mystical iris - bright cyan-green center fading to void black -->
    <radialGradient id="irisLeft" cx="349" cy="524" r="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5FFFD8"/>
      <stop offset="25%" stop-color="#2CDAB0"/>
      <stop offset="55%" stop-color="#0F7A68"/>
      <stop offset="85%" stop-color="#082028"/>
      <stop offset="100%" stop-color="#030608"/>
    </radialGradient>
    <radialGradient id="irisRight" cx="674" cy="524" r="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5FFFD8"/>
      <stop offset="25%" stop-color="#2CDAB0"/>
      <stop offset="55%" stop-color="#0F7A68"/>
      <stop offset="85%" stop-color="#082028"/>
      <stop offset="100%" stop-color="#030608"/>
    </radialGradient>
    
    <!-- Outer supernatural glow bleeding beyond eye boundaries -->
    <radialGradient id="eyeGlowLeft" cx="349" cy="524" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4FFFD4" stop-opacity="0.45"/>
      <stop offset="40%" stop-color="#2CDAB0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2CDAB0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlowRight" cx="674" cy="524" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4FFFD4" stop-opacity="0.45"/>
      <stop offset="40%" stop-color="#2CDAB0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2CDAB0" stop-opacity="0"/>
    </radialGradient>
    
    <clipPath id="clipLeftIris">
      <circle cx="349" cy="524" r="92"/>
    </clipPath>
    <clipPath id="clipRightIris">
      <circle cx="674" cy="524" r="92"/>
    </clipPath>
  </defs>
  
  <!-- Deep atmospheric background -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <rect x="2" y="2" width="1020" height="1020" stroke="#1A1F22" stroke-width="4"/>
  
  <!-- Mystical haze centered on owl -->
  <ellipse cx="512" cy="500" rx="440" ry="420" fill="url(#mysticHaze)"/>
  
  <!-- Supernatural glow around each eye (bleeds beyond iris) -->
  <circle cx="349" cy="524" r="180" fill="url(#eyeGlowLeft)"/>
  <circle cx="674" cy="524" r="180" fill="url(#eyeGlowRight)"/>
  
  <!-- Iris discs with glow-from-within gradient -->
  <circle cx="349" cy="524" r="92" fill="url(#irisLeft)"/>
  <circle cx="674" cy="524" r="92" fill="url(#irisRight)"/>
  
  <!-- VERTICAL SLIT PUPILS - predator/demonic feel, clipped to iris -->
  <g clip-path="url(#clipLeftIris)">
    <circle cx="358" cy="528" r="28" fill="#000000"/>
  </g>
  <g clip-path="url(#clipRightIris)">
    <circle cx="665" cy="528" r="28" fill="#000000"/>
  </g>
  
